<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT账号管理助手 - 登录</title>
  <link rel="stylesheet" href="/styles.css?v={{APP_VERSION}}">
  <link rel="stylesheet" href="/forge-theme.css?v={{APP_VERSION}}">
  <script src="/i18n.js?v={{APP_VERSION}}" defer></script>
</head>
<body>
  <main class="login-page">
    <section class="panel admin-login-card">
      <a class="brand" href="/" aria-label="GPT账号管理助手">
        <span class="brand-mark" aria-hidden="true">AD</span>
        <span class="brand-copy">
          <strong>登录 GPT账号管理助手</strong>
          <em>验证访问令牌后回到原访问位置</em>
        </span>
      </a>
      <form id="adminLoginForm" class="admin-login-form">
        <label>
          <span>访问令牌</span>
          <input id="adminToken" type="password" autocomplete="current-password" placeholder="请输入访问令牌" autofocus>
        </label>
        <button id="loginButton" class="primary" type="submit">登录</button>
      </form>
      <p id="loginStatus" class="login-note">令牌验证成功后会写入 HttpOnly 登录 Cookie；管理员页和自检页继续使用同一套认证。</p>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/admin.html";
    const tokenInput = document.querySelector("#adminToken");
    const form = document.querySelector("#adminLoginForm");
    const button = document.querySelector("#loginButton");
    const status = document.querySelector("#loginStatus");
    const remembered = localStorage.getItem("ctgptm.admin.toolToken") || "";
    if (remembered) tokenInput.value = remembered;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const token = tokenInput.value.trim();
      if (!token) {
        status.textContent = "先填管理令牌。";
        return;
      }
      button.disabled = true;
      button.textContent = "验证中";
      status.textContent = "正在验证令牌...";
      try {
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.success) {
          throw new Error(payload.error || "令牌不正确");
        }
        localStorage.setItem("ctgptm.admin.toolToken", token);
        window.location.href = next.startsWith("/") ? next : "/admin.html";
      } catch (error) {
        status.textContent = error.message || "登录失败";
        button.disabled = false;
        button.textContent = "登录";
      }
    });
  </script>
</body>
</html>
