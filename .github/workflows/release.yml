name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          git archive --format=zip --output="gpt-account-manager-${GITHUB_REF_NAME}.zip" HEAD

      - name: Create release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## GPT账号管理助手

          本次发布重点：

          - 右上角新增中英文语言切换，默认中文，英文界面可一键切换。
          - 语言选择保存在当前浏览器，刷新页面后保持上一次选择。
          - 覆盖账号管理、邮箱管理、凭证刷新、仓管、自检、登录和转换器等核心页面。
          - 国际化层只翻译固定界面文案，不翻译邮箱、代理、token、日志业务内容等用户数据。
          - 保留上一版邮箱验证、失败账号清理、Docker 部署和同步升级能力。

          部署方式仍然推荐 Docker Compose：

          ```bash
          git pull --ff-only origin main
          docker compose up -d --build --force-recreate
          ```
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --latest \
            "gpt-account-manager-${GITHUB_REF_NAME}.zip"
