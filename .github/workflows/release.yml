name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          git archive --format=zip --output="gpt-account-manager-${GITHUB_REF_NAME}.zip" HEAD

      - name: Create release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## GPT账号管理助手

          本次发布重点：

          - 刷新页新增“验证邮箱”，先独立检查取码邮箱能否收件。
          - 验证时会使用当前工作区保存的真实取码凭证，避免前端打码凭证造成误判。
          - 未验证或验证失败的邮箱不会直接加入刷新队列。
          - 邮箱状态细分为可收件、未发现验证码、Graph/IMAP 收信失败、临时邮箱 JWT 无效等。
          - 邮箱管理页权限类型显示为 JWT、Graph/IMAP、Graph+IMAP+密码。
          - README 增加脱敏界面截图，邮箱、token、代理信息已打码。

          部署方式仍然推荐 Docker Compose：

          ```bash
          git pull --ff-only origin main
          docker compose up -d --build --force-recreate
          ```
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --latest \
            "gpt-account-manager-${GITHUB_REF_NAME}.zip"
